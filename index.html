<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>HapiNaviGPS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!--上部バー-->
  <div class="top">
    <div class="logo">HapiNaviGPS</div>

    <div class="right-group">
      <div class="record">
        <span class="label">運転記録</span>
        <div class="toggle" id="toggle"></div>
      </div>

      <div class="brand">
          <div class="catch">ふくいとあしたの架け橋に、</div>
          <div class="main-name">HAPI-LINE FUKUI</div>
          <div class="Note">※このサイトは非公式のファン制作です。</div>
          <div class="Note">実在する企業様とは一切関係ありません。</div>
      </div>
    </div>
  </div>

  <!--メイン-->
  <div class="main">

    <div class="left-top">
      <div class="type" id="type">普  通</div>
      <div class="sub" id="type-en">Local</div>
    </div>

    <div class="right-top">
      ?????
    </div>

    <div class="center">
      <span class="big">0</span>
      <span class="unit">両編成</span>
    </div>

    <div class="next">
      <span class="next-text">NEXT＞ 読み込み中…</span>
      <div class="detail">
        現在位置:65K 540m / 残り距離:－－－－
      </div>
    </div>

    <div class="stop-label">停車中</div>

  </div>

  <!--下ボタン-->
  <div class="bottom">
    <div class="btn">副本線設定</div>
    <div class="btn">踏切故障</div>
    <div class="btn">速度制限</div>
    <div class="btn">位置情報送信</div>
    <div class="btn">乗務終了</div>
  </div>

</div>

<script type="module" src="main.js"></script>
<script src="script.js"></script>

</body>
</html>
